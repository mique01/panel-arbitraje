services:
  - type: web
    name: ggal-microscalping-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    autoDeploy: true
  - type: worker
    name: ggal-microscalping-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.marketdata.worker
    autoDeploy: true
